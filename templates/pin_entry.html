<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta http-equiv="X-UA-Compatible" content="IE=edge"><meta name="viewport" content="width=device-width, initial-scale=1"><link rel="apple-touch-icon" sizes="180x180" href="/static/apple-touch-icon.png"><link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32x32.png"><link rel="icon" type="image/png" sizes="16x16" href="/static/favicon-16x16.png"><link rel="icon" type="image/x-icon" href="/static/favicon.ico"><meta name="msapplication-TileColor" content="#0ed3cf"><meta name="theme-color" content="#0ed3cf"><title>PIN Required | {{locales.oem_name}} - 配置</title><script defer src="/static/alpine-3.10.2.js"></script><link rel="stylesheet" href="/static/app.css"><style>[x-cloak]{display:none!important;}</style><script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script></head><body class="bg-gray-200"><div class="md:6/12 m-auto my-10 w-10/12 bg-white shadow-md lg:w-4/12"><div class="bg-pcatblue px-6 py-4 text-white"><div class="text-lg font-semibold">🔐 PIN Required</div><div class="text-sm opacity-90">Enter PIN to access protected page</div></div><div class="p-6"><div x-data="pinEntry()" class="space-y-4"><div x-show="error" x-cloak class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded relative"><span x-text="error"></span></div><div><label for="pin" class="block text-sm font-medium text-gray-700 mb-2"> Enter 4-digit PIN: </label><input type="password" id="pin" x-model="pin" @keyup.enter="verifyPin()" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-pcatblue focus:border-pcatblue text-center text-2xl font-mono tracking-widest" maxlength="4" pattern="[0-9]{4}" placeholder="••••" autocomplete="off" x-ref="pinInput"></div><button @click="verifyPin()" :disabled="submitting || pin.length !== 4" :class="submitting || pin.length !== 4 ? 'bg-gray-400 cursor-not-allowed' : 'bg-pcatblue hover:bg-blue-600'" class="w-full text-white px-4 py-3 rounded transition-colors font-semibold"><span x-show="!submitting">🔓 Verify PIN</span><span x-show="submitting" x-cloak>⏳ Verifying...</span></button><div class="text-center"><a href="/" class="text-sm text-gray-500 hover:text-gray-700"> ← Back to Dashboard </a></div></div></div></div><script>
      // Simple SHA-256 implementation for fallback
      function sha256(str) {
        function rightRotate(value, amount) {
          return (value >>> amount) | (value << (32 - amount));
        }
        
        function sha256Transform(m, offset) {
          var a = 0x6a09e667, b = 0xbb67ae85, c = 0x3c6ef372, d = 0xa54ff53a;
          var e = 0x510e527f, f = 0x9b05688c, g = 0x1f83d9ab, h = 0x5be0cd19;
          
          var w = new Array(64);
          
          for (var i = 0; i < 16; i++) {
            w[i] = (m[offset + i * 4] << 24) | (m[offset + i * 4 + 1] << 16) | 
                   (m[offset + i * 4 + 2] << 8) | m[offset + i * 4 + 3];
          }
          
          for (var i = 16; i < 64; i++) {
            var s0 = rightRotate(w[i - 15], 7) ^ rightRotate(w[i - 15], 18) ^ (w[i - 15] >>> 3);
            var s1 = rightRotate(w[i - 2], 17) ^ rightRotate(w[i - 2], 19) ^ (w[i - 2] >>> 10);
            w[i] = (w[i - 16] + s0 + w[i - 7] + s1) >>> 0;
          }
          
          var k = [
            0x428a2f98, 0x71374491, 0xb5c0fbcf, 0xe9b5dba5, 0x3956c25b, 0x59f111f1, 0x923f82a4, 0xab1c5ed5,
            0xd807aa98, 0x12835b01, 0x243185be, 0x550c7dc3, 0x72be5d74, 0x80deb1fe, 0x9bdc06a7, 0xc19bf174,
            0xe49b69c1, 0xefbe4786, 0x0fc19dc6, 0x240ca1cc, 0x2de92c6f, 0x4a7484aa, 0x5cb0a9dc, 0x76f988da,
            0x983e5152, 0xa831c66d, 0xb00327c8, 0xbf597fc7, 0xc6e00bf3, 0xd5a79147, 0x06ca6351, 0x14292967,
            0x27b70a85, 0x2e1b2138, 0x4d2c6dfc, 0x53380d13, 0x650a7354, 0x766a0abb, 0x81c2c92e, 0x92722c85,
            0xa2bfe8a1, 0xa81a664b, 0xc24b8b70, 0xc76c51a3, 0xd192e819, 0xd6990624, 0xf40e3585, 0x106aa070,
            0x19a4c116, 0x1e376c08, 0x2748774c, 0x34b0bcb5, 0x391c0cb3, 0x4ed8aa4a, 0x5b9cca4f, 0x682e6ff3,
            0x748f82ee, 0x78a5636f, 0x84c87814, 0x8cc70208, 0x90befffa, 0xa4506ceb, 0xbef9a3f7, 0xc67178f2
          ];
          
          for (var i = 0; i < 64; i++) {
            var s1 = rightRotate(e, 6) ^ rightRotate(e, 11) ^ rightRotate(e, 25);
            var ch = (e & f) ^ (~e & g);
            var temp1 = (h + s1 + ch + k[i] + w[i]) >>> 0;
            var s0 = rightRotate(a, 2) ^ rightRotate(a, 13) ^ rightRotate(a, 22);
            var maj = (a & b) ^ (a & c) ^ (b & c);
            var temp2 = (s0 + maj) >>> 0;
            
            h = g; g = f; f = e; e = (d + temp1) >>> 0;
            d = c; c = b; b = a; a = (temp1 + temp2) >>> 0;
          }
          
          return [(a >>> 0), (b >>> 0), (c >>> 0), (d >>> 0), (e >>> 0), (f >>> 0), (g >>> 0), (h >>> 0)];
        }
        
        var utf8Encode = function(str) {
          var bytes = [];
          for (var i = 0; i < str.length; i++) {
            var code = str.charCodeAt(i);
            if (code < 0x80) {
              bytes.push(code);
            } else if (code < 0x800) {
              bytes.push(0xc0 | (code >> 6));
              bytes.push(0x80 | (code & 0x3f));
            } else if (code < 0x10000) {
              bytes.push(0xe0 | (code >> 12));
              bytes.push(0x80 | ((code >> 6) & 0x3f));
              bytes.push(0x80 | (code & 0x3f));
            }
          }
          return bytes;
        };
        
        var message = utf8Encode(str);
        var msgLen = message.length;
        var msgBits = msgLen * 8;
        
        message.push(0x80);
        
        while (message.length % 64 !== 56) {
          message.push(0x00);
        }
        
        for (var i = 7; i >= 0; i--) {
          message.push((msgBits >>> (i * 8)) & 0xff);
        }
        
        var hash = [0x6a09e667, 0xbb67ae85, 0x3c6ef372, 0xa54ff53a, 0x510e527f, 0x9b05688c, 0x1f83d9ab, 0x5be0cd19];
        
        for (var i = 0; i < message.length; i += 64) {
          var result = sha256Transform(message, i);
          for (var j = 0; j < 8; j++) {
            hash[j] = (hash[j] + result[j]) >>> 0;
          }
        }
        
        return hash.map(function(h) {
          return ('00000000' + h.toString(16)).slice(-8);
        }).join('');
      }

      function pinEntry() {
        return {
          pin: '',
          error: '',
          submitting: false,
          
          init() {
            // Focus on PIN input when page loads
            this.$nextTick(() => {
              this.$refs.pinInput.focus();
            });
          },
          
          async verifyPin() {
            if (this.pin.length !== 4) {
              this.error = 'PIN must be 4 digits';
              return;
            }
            
            this.error = '';
            this.submitting = true;
            
            try {
              // Debug: Log the PIN input
              console.log('PIN input:', this.pin);
              console.log('PIN length:', this.pin.length);
              console.log('PIN type:', typeof this.pin);
              console.log('crypto.subtle available:', !!window.crypto?.subtle);
              console.log('CryptoJS available:', !!window.CryptoJS);
              
              let hashHex;
              
              // Try Web Crypto API first (requires HTTPS)
              if (window.crypto && window.crypto.subtle) {
                console.log('Using Web Crypto API');
                const encoder = new TextEncoder();
                const data = encoder.encode(this.pin);
                const hashBuffer = await crypto.subtle.digest('SHA-256', data);
                const hashArray = Array.from(new Uint8Array(hashBuffer));
                hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
              } 
              // Fallback to CryptoJS
              else if (window.CryptoJS) {
                console.log('Using CryptoJS fallback');
                hashHex = CryptoJS.SHA256(this.pin).toString(CryptoJS.enc.Hex);
              }
              // Final fallback to built-in SHA-256 implementation
              else {
                console.log('Using built-in SHA-256 fallback');
                hashHex = sha256(this.pin);
              }
              
              // Debug: Log the generated hash
              console.log('Generated hash:', hashHex);
              console.log('Expected hashes:');
              console.log('  - b2b2f104d32c638903e151a9b20d6e27b41d8c0c84cf8458738f83ca2f1dd744 (SHA-256("2025"))');
              console.log('  - dba6556da111d223aa0010613f53fc7054f8374be605aa2cb8867ae9200a6fe2 (User provided)');
              
              const validHashes = [
                'b2b2f104d32c638903e151a9b20d6e27b41d8c0c84cf8458738f83ca2f1dd744',
                'dba6556da111d223aa0010613f53fc7054f8374be605aa2cb8867ae9200a6fe2'
              ];
              const isMatch = validHashes.some(h => h.toLowerCase() === hashHex.toLowerCase());
              console.log('Hash match:', isMatch);
              
              // Send verification request
              const response = await fetch('/pin_verify', {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                  pin_hash: hashHex,
                  target_url: '{{ target_url }}'
                })
              });
              
              const result = await response.json();
              
              if (result.success) {
                // Redirect to target URL
                window.location.href = result.redirect_url;
              } else {
                this.error = result.error || 'Invalid PIN';
                this.pin = '';
                this.$refs.pinInput.focus();
              }
            } catch (error) {
              console.error('PIN verification error:', error);
              this.error = 'Verification failed. Please try again.';
            }
            
            this.submitting = false;
          }
        }
      }
      
      // Auto-focus PIN input on load
      document.addEventListener('DOMContentLoaded', function() {
        const pinInput = document.getElementById('pin');
        if (pinInput) {
          setTimeout(() => pinInput.focus(), 100);
        }
      });
    </script></body></html>
